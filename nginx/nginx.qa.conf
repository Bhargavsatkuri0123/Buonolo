worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/css application/javascript application/json image/svg+xml;

  # WebSocket upgrade support for the /ws gateway.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    # Static frontend build.
    root /usr/share/nginx/html;
    index index.html;

    # Gate the whole QA site behind Microsoft Entra ID SSO (oauth2-proxy),
    # restricted to @pearwavetechnologiesltd.com. Every location below inherits
    # this auth_request unless it explicitly turns it off.
    auth_request /oauth2/auth;
    error_page 401 = /oauth2/sign_in?rd=$scheme://$host$request_uri;
    auth_request_set $auth_user $upstream_http_x_auth_request_user;
    auth_request_set $auth_email $upstream_http_x_auth_request_email;

    location = /oauth2/auth {
      internal;
      auth_request off;
      proxy_pass http://oauth2-proxy:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Auth-Request-Redirect $request_uri;
      proxy_set_header Content-Length "";
      proxy_pass_request_body off;
    }

    location /oauth2/ {
      auth_request off;
      proxy_pass http://oauth2-proxy:4180;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      try_files $uri /index.html;
    }

    location /api/ {
      proxy_pass http://backend:4000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-User $auth_user;
      proxy_set_header X-Forwarded-Email $auth_email;
    }

    location /ws {
      proxy_pass http://backend:4000/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # Served directly from the shared uploads volume rather than proxied through
    # the backend, since Nginx can hand static files back faster than Node can.
    location /uploads/ {
      alias /usr/share/nginx/uploads/;
      autoindex off;
    }

    # S3-backed uploads (STORAGE_BACKEND=s3): proxied through the same origin so
    # the browser never needs bucket CORS config, and the SSO gate above also
    # covers uploaded images.
    location /s3-uploads/ {
      proxy_pass https://buonolo.s3.eu-west-2.amazonaws.com/;
      proxy_set_header Host buonolo.s3.eu-west-2.amazonaws.com;
      proxy_ssl_server_name on;
    }
  }
}
