name: Build and deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to deploy
        required: false
        default: main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 940127591852.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPOSITORY: buonolo
  DEPLOY_HOST: 13.40.179.189
  DEPLOY_USER: ubuntu
  DEPLOY_PATH: /opt/buonolo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - id: tag
        run: echo "image_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::940127591852:role/codebuild-buonolo_dev-service-role
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG" \
                       -t "$ECR_REGISTRY/$ECR_REPOSITORY:backend-latest" \
                       ./backend
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:backend-$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:backend-latest"

      - name: Build and push nginx (web) image
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          docker build -f nginx/Dockerfile \
                       -t "$ECR_REGISTRY/$ECR_REPOSITORY:nginx-$IMAGE_TAG" \
                       -t "$ECR_REGISTRY/$ECR_REPOSITORY:nginx-latest" \
                       .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:nginx-$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:nginx-latest"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 0

      - name: Pull images and restart stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            mv docker-compose.prod.yml docker-compose.yml
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose pull backend nginx
            docker compose up -d
            docker image prune -f
